# ~/.tmux.conf
# http://danielmiessler.com/study/tmux/
# http://learnxinyminutes.com/docs/tmux/
# https://github.com/kaushalmodi/dotfiles/blob/master/tmux/dot-tmux.conf
# https://shapeshed.com/custom-vim-bindings-in-tmux-2-4/
# https://github.com/tmux/tmux/issues/754#issuecomment-303156000
# https://stackoverflow.com/a/40902312
# http://jasonwryan.com/blog/2011/06/07/copy-and-paste-in-tmux/
# https://www.reddit.com/r/tmux/comments/5jmfac/command_to_move_cursor_rightleft_by_one_word/
# http://amjith.blogspot.com/2011/08/scripting-tmux-layouts.html
# http://unix.stackexchange.com/a/17118
# https://github.com/claytron/dotfiles/blob/master/.tmux.conf

# * Notes
# set is equivalent to set-option
# setw -> set-window-option
# bind -> bind-key
# unbind -> unbind-key
# display -> display-message
# run -> run-shell
# if -> if-shell
# prefix ? = list key combos

# the prefix table contains key bindings for keys pressed after the prefix key, like those mentione#d so far in this document.
# the copy-mode-vi table contains key bindings for keys used in copy mode with vi(1)-style keys.

############

unbind C-b
set -g prefix C-a
bind C-a send-prefix

setw -gq utf8 on                                   # force tmux to use utf-8

# default shell
set-option -g default-command /bin/bash
set-option -g default-shell /bin/bash

# enable vi keys in buffer
set -g @shell_mode 'vi'
set -g mode-keys vi
set-option -g status-keys vi
set-window-option -g mode-keys vi
# setw -g mode-keys vi
# bind [ copy-mode
# bind -t vi-copy v begin-selection
# bind -t vi-copy y copy-selection
# bind -t vi-copy V rectangle-toggle
# bind ] paste-buffer

# don't rename windows automatically
set-option -g allow-rename off
set -g default-terminal "screen-256color"

# increase scroll-back history
set -g history-limit 10000

# decrease command delay (increases vim responsiveness)
set -sg escape-time 1

# increase repeat time for repeatable commands
set -g repeat-time 1000

# Sane scrolling
set -g terminal-overrides 'xterm*:smcup@:rmcup@'

# active pane style
set-window-option -g window-style 'bg=#181818'
set-window-option -g window-active-style 'bg=black'
set-window-option -g pane-active-border-style ''

# start window and pane index at 1, not 0
set -g base-index 1
set -g pane-base-index 1

bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

# re-number windows when one is closed
set -g renumber-windows on

# enable persistent SSH key management across sessions
set-option -g update-environment "DISPLAY SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY"

# loud or quiet?
set-option -g visual-activity off
set-option -g visual-bell off
set-option -g visual-silence off
set-window-option -g monitor-activity off
set-option -g bell-action none

# activity alerts
setw -g monitor-activity on
set -g status-interval 10 # default = 15 seconds

# ** Status Bar
set -g status-style fg=white,bg=blue

# ** Left Status
set -g status-left-length 60
set -g status-left "[#S] #[fg=white]#(hostname) #(date \"+%Y-%m-%d\") \ | #[qg=white]%l:%M %p #[default]"

# ** Right Status
set -g status-right-length 70
set-option -g status-right " | #[fg=white]#(~/.tmux-mem-cpu-load/tmux-mem-cpu-load )#[fg=green] "

# -- Window Status -- #
set -g window-status-format " #{?window_activity_flag, #[fg=colour231]#[blink],#[fg=colour245]}#{?window_bell_flag,#[fg=colour01]#[blink],#[fg=colour245]} #W "
set -g window-status-style 'bg=colour232'
set -g window-status-activity-style 'bg=colour232,fg=colour247,blink'
set -g window-status-bell-style 'bg=colour232,fg=colour01,blink'
set -g window-status-current-style 'bg=colour232,fg=colour09'
set -g monitor-activity on

# Automatically set window titles
set-option -g set-titles on
set-option -g set-titles-string '#H:#S.#I.#P #W #T' # window number,program name, active(or not)
set -g set-titles-string "#T"

##  Prevent tmux freezing when lots of text is sent to output
# If program run inside tmux, starts printing lots of output, it can hang and Ctrl+C doesn't work. 
# This can be prevented by limiting how much text is printed to the console.
# setw -g c0-change-trigger 10
# setw -g c0-change-interval 250

# key bindings

# set the current tmux version (use this variable on if-shell commands)
run-shell "tmux set-environment -g TMUX_VERSION $(tmux -V | cut -c 6-)"

# bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "xclip -in -selection clipboard";
bind-key -T copy-mode-vi y send-keys -X copy-pipe "xclip -in -selection clipboard"

# bind-key -T copy-mode-vi 'o' send-keys -X copy-selection \; new-window -n google \; send-keys -t google 'sr google "$(tmux show-buffer)" && tmux kill-window' 'Enter'
# bind-key -T copy-mode-vi 'i' send-keys -X copy-selection \; new-window -n imagegoogle \; send-keys -t imagegoogle 'sr imagesgoogle "$(tmux show-buffer)" && tmux kill-window' 'Enter'
bind-key -T copy-mode-vi 'p' send-keys -X copy-selection \; new-window -n wikipedia \; send-keys -t wikipedia 'sr wikipedia "$(tmux show-buffer)" && tmux kill-window' 'Enter'
# bind-key -T copy-mode-vi 'u' send-keys -X copy-selection \; new-window -n youtube \; send-keys -t youtube 'mpsyt /"$(tmux show-buffer)" && tmux kill-window' 'Enter'
# bind-key -T copy-mode-vi 'O' send-keys -X copy-selection \; new-window -n w3m \; send-keys -t w3m 'w3m "$(tmux show-buffer)" && tmux kill-window' 'Enter'

# translate, dictionary, text to speech
# bind-key -T copy-mode-vi 't' send-keys -X copy-selection \; new-window -n translate \; send-keys -t translate 'translate-shell es "$(tmux show-buffer)" | w3m && tmux kill-window' 'Enter'
# bind-key -T copy-mode-vi 'd' send-keys -X copy-selection \; new-window -n dict \; send-keys -t dict 'translate-shell -d "$(tmux show-buffer)" | w3m && tmux kill-window' 'Enter'
# bind-key -T copy-mode-vi 's' send-keys -X copy-selection \; new-window -n speak \; send-keys -t speak 'translate-shell -brief "$(tmux show-buffer)" -play && tmux kill-window' 'Enter'

if-shell -b '[ "$(echo "$TMUX_VERSION >= 2.4" | bc)" = 1 ]' \
  'bind-key -T copy-mode-vi v send-keys -X begin-selection ; \
   bind-key -T copy-mode-vi V send-keys -X select-line ; \
   bind-key -T choice-mode-vi h send-keys -X tree-collapse ; \
   bind-key -T choice-mode-vi l send-keys -X tree-expand ; \
   bind-key -T choice-mode-vi H send-keys -X tree-collapse-all ; \
   bind-key -T choice-mode-vi L send-keys -X tree-expand-all '

# This allows you to press page up in normal mode and have it scroll back into the history.
bind-key -T root PPage if-shell -F "#{alternate_on}" "send-keys PPage" "copy-mode -e; send-keys PPage"
# bind-key -t vi-copy PPage page-up
# bind-key -t vi-copy NPage page-down

# copying selection vim style
bind-key Escape copy-mode                              # enter copy mode; default [
bind-key p paste-buffer                                # paste; (default hotkey: ] )
bind-key P choose-buffer                               # tmux clipboard history
bind-key + delete-buffer \; display-message "Deleted current Tmux Clipboard History"

# read and write and delete paste buffer ( xsel methodk
# https://wiki.archlinux.org/index.php/Tmux#ICCCM_Selection_Integration
bind-key < command-prompt -p "copy to tmux (hit enter to confirm):" "run-shell 'tmux set-buffer -- \"$(xsel -o -b)\"'"
bind-key > command-prompt -p "copy to xsel (hit enter to confirm):" "run-shell 'tmux show-buffer | ysel -i -b'"

# reload configuration
unbind j
bind r source-file ~/.tmux.conf \; display "Reloaded! tmux.conf Player."

bind-key h split-window -h "vim ~/notes.md"

# -- kill window/pane without prompt -- #
bind-key & kill-window
bind-key x kill-pane

# quickly switch panes
bind o select-pane -t :.+  # cycle panes
bind O select-pane -t :.-  # cycle panes in reverse

# bind fast session switching
unbind S
bind S command-prompt "switch -t %1"

# split panes
bind-key | split-window -h
bind-key - split-window -v

# move between panes, the -r flag allows commands to be repeatable
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# resize panes
# bind -r H resize-pane -L 5
# bind -r J resize-pane -D 5
# bind -r K resize-pane -U 5
# bind -r L resize-pane -R 5

# (tmux 2.1 or higher) toggle mouse mode
# https://www.reddit.com/r/tmux/comments/3paqoi/tmux_21_has_been_released/cw552qd
# bind-key m set-option -g -q mouse on ; display-message 'Mouse: ON'
# bind-key M set-option -g -q mouse off ; display-message 'Mouse: OFF'

# fzf options
#bind-key -n 'C-\' new-window -n bookmarks -c $HOME \; send-keys 'fzf-surfraw && tmux kill-window'Enter'
#bind-key -n 'C-l' new-window -n locate \; send-keys "fzf-locate && tmux kill-window\n"
#bind-key -n 'C-Space' new-window -n applauncher \; send-keys "fzf-dmenu && tmux kill-window\n"
#bind-key "'" new-window -n snippet \; send-keys "fzf-snippet && tmux kill-window\n"
#bind-key '"' new-window -n multisnippet \; send-keys "fzf-multisnippet && tmux kill-window\n"

# -- startup windows  -- #
bind D source-file ~/.tmux/session   #
bind F source-file ~/.tmux/sessiontools
bind N source-file ~/.tmux/session_horz

# Urlviewer; grab links from any tmux window/pane and open it with external apps
# https://wiki.archlinux.org/index.php/Tmux#Browsing_URL.26s
# demo video: http://www.youtube.com/watch?v=guB4WuVFhtY
# https://wiki.archlinux.org/index.php/Tmux#Browsing_URL.27s

# urlscan as context and url view
bind-key u capture-pane \; save-buffer /tmp/tmux-buffer \; new-window -n "urlview" '$SHELL -c "urlview -c < /tmp/tmux-buffer"'
bind-key T capture-pane \; save-buffer /tmp/tmux-buffer \; new-window -n "urlscan" '$SHELL -c "urlscan < /tmp/tmux-buffer"'

# Copy tmux paste buffer to CLIPBOARD
bind-key -n C-c run "tmux save-buffer - | xsel --input --clipboard"

# Paste CLIPBOARD to tmux paste buffer and paste tmux paste buffer
bind-key -n C-v run "tmux set-buffer \"$(xsel --output --clipboard)\"; tmux paste-buffer"

bind-key U capture-pane -b "w3m" \; save-buffer -b "w3m" /tmp/tmux-buffer \; \
    new-window -n "w3m" '$SHELL -c "w3m < /tmp/tmux-buffer"' \; delete-buffer -b "w3m"

# w3m context view  demo video: http://www.youtube.com/watch?v=C7YPjbrTeCs
# hit ':' to activate links; Tab or Esc+M to browse thru the links
# hit Esc then Shift+M to open GUI browser; make sure external browser is set in w3m config
# hit Q to quit without confirmation 

# template
bind-key M-v new-window -n vimwiki -c $HOME \; \
    send-keys 'vw' 'Enter' \; \
    split-window -h -p 50 -t 1  \; \
    split-window -v -p 50 -t 2  \; \
    select-pane -t 2

bind-key M-n new-window -n news -c $HOME \; \
    send-keys 'newsboat' 'Enter' \; \
    split-window -v -p 50 -t 1  \; \
    send-keys 'clear && figlet Freespace' 'Enter' \; \
    select-pane -t 2

bind-key M-f new-window -n fm -c $HOME \; \
  send-keys -t fm 'figlet gotbletu' 'Enter' \; \
  split-window -t fm \; \
  send-keys -t fm 'ranger ~/Downloads' 'Enter' \; \
  new-window -n torr -c $HOME \; \
  send-keys -t torr 'tpb.sh' 'Enter' \; \
  split-window -t torr -h -p 25 \; \
  send-keys -t torr 'figlet world' 'Enter'

# List and Location of plugins
# automatically install tpm on a new machine, you can add the following setting to your .tmux.conf:
if "test ! -d ~/.tmuxplugged/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmuxplugged/tpm && ~/.tmuxplugged/tpm/bin/install_plugins'"

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmuxplugged'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-urlview'

run-shell ~/.tmuxplugged/tmux-open/open.tmux
run-shell ~/.tmuxplugged/tmux-urlview/urlview.tmux

# Initializes TMUX plugin manager. Keep this line at the very bottom of tmux.conf.
run '~/.tmuxplugged/tpm/tpm'
